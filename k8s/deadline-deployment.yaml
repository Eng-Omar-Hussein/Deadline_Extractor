apiVersion: v1
kind: Namespace
metadata:
  name: deadline-model
  labels:
    name: deadline-model
    environment: development

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deadline-model-api
  labels:
    app: deadline-model
  namespace: deadline-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deadline-model
  template:
    metadata:
      labels:
        app: deadline-model
    spec:
      volumes:
        - name: deadline-model-volume
          hostPath:
            # Change this to the exact absolute path on your local machine/WSL
            path: /tmp/deadline_model
            # This tells K8s to create the folder on your machine if it's missing
            type: DirectoryOrCreate

      initContainers:
        - name: download-model
          image: python:3.12-slim
          command:
            - sh
            - -c
            - |
              ls -la
              pwd
              cd /model

              if [ -f "model.onnx" ]; then
                echo "Model already exists in /model. Skipping download!"
                exit 0
              fi
              
              apt-get update && apt-get install -y unzip 
              pip install --no-cache-dir gdown 
              gdown "https://drive.google.com/file/d/1JGJA0Mi5_SCDDOqIfcoNZhnlUFq6EPHr/view?usp=sharing"
              unzip *.zip
              pwd
              whoami
              mv content/deadline_ner_onnx/* .
              ls -la
              rm -rf content
              rm *.zip
              chmod -R a+r /model

          volumeMounts:
            - name: deadline-model-volume
              mountPath: /model

      containers:
        - name: api
          image: omarhussein2111/deadline-model:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          volumeMounts:
            - name: deadline-model-volume
              mountPath: /app/model

          env:
            - name: MODEL_DIR
              value: /app/model

---
apiVersion: v1
kind: Service
metadata:
  name: deadline-model-service
  namespace: deadline-model
spec:
  type: LoadBalancer
  selector:
    app: deadline-model
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

